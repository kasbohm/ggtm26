   window.showElevationProfile = function(dayId) {
    // Reset flags
    window.champagneShown = false;
    window.beerShown = false;
    
    // Tøm confetti container
    const confettiContainer = document.getElementById('confetti-container');
    if (confettiContainer) {
        confettiContainer.innerHTML = '';
    }
    
    const profile = document.getElementById('elevationProfile');
    let canvas = document.getElementById('profileCanvas');
    let ctx = canvas.getContext('2d');
    const title = document.getElementById('profileTitle');

    // Vis boksen først
    profile.classList.add('visible');

    // Vent til browser har rendret layout
    requestAnimationFrame(() => {

        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;

        const day = days.find(d => d.id === dayId);
        let dayRoutes;
        let profileTitle = '';

        // If day has routes, use those. Otherwise, use all loaded routes
        if (day && day.routes.length > 0) {
            dayRoutes = sortRoutesUtHjem(day.routes
                .map(routeId => routes.find(r => r.id === routeId))
                .filter(r => r && r.gpxPoints));
            profileTitle = `Dag ${dayId}`;
        } else if (routes.length > 0) {
            // Fallback: show all routes if no routes selected for this day
            dayRoutes = routes.filter(r => r && r.gpxPoints);
            profileTitle = 'Alle ruter';
        } else {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00f5ff';
            ctx.font = '14px Courier New';
            ctx.fillText('Ingen ruter lastet!', 10, 30);
            ctx.fillText('Last opp GPX-filer eller velg ruter først.', 10, 50);
            return;
        }

        if (dayRoutes.length === 0) return;

        // ---- Slå sammen alle punkter ----
        let allPoints = [];
        dayRoutes.forEach(route => allPoints = allPoints.concat(route.gpxPoints));
        const pointsWithEle = allPoints.filter(p => p.ele !== null);
        if (pointsWithEle.length < 2) return;

        // ---- Kumulativ distanse ----
        let cumulativeDistance = [0];
        for (let i = 1; i < pointsWithEle.length; i++) {
            const p1 = pointsWithEle[i - 1];
            const p2 = pointsWithEle[i];
            const R = 6371000;
            const φ1 = p1.lat * Math.PI / 180;
            const φ2 = p2.lat * Math.PI / 180;
            const Δφ = (p2.lat - p1.lat) * Math.PI / 180;
            const Δλ = (p2.lon - p1.lon) * Math.PI / 180;
            const a = Math.sin(Δφ / 2) ** 2 +
                      Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ / 2) ** 2;
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            const distance = R * c / 1000;
            cumulativeDistance.push(cumulativeDistance[i - 1] + distance);
        }

        const totalDistance = cumulativeDistance[cumulativeDistance.length - 1];
        const elevations = pointsWithEle.map(p => p.ele);
        const minEle = Math.min(...elevations);
        const maxEle = Math.max(...elevations);

        // ---- Beregn akkumulert høydemeter for tooltip ----
        let accumulatedGain = [0];
        for (let i = 1; i < pointsWithEle.length; i++) {
            const eleDiff = pointsWithEle[i].ele - pointsWithEle[i - 1].ele;
            accumulatedGain.push(accumulatedGain[i - 1] + (eleDiff > 0 ? eleDiff : 0));
        }

        // ---- Sett opp hover tooltip event listeners ----
        const tooltip = document.getElementById('elevationTooltip');
        
        // Fjern gamle event listeners
        const oldCanvas = canvas;
        const newCanvas = oldCanvas.cloneNode(true);
        oldCanvas.parentNode.replaceChild(newCanvas, oldCanvas);
        
        // Oppdater referanser til ny canvas
        canvas = document.getElementById('profileCanvas');
        ctx = canvas.getContext('2d');
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            
            // Find closest point on profile
            const normalizedX = mouseX / canvas.width;
            const distanceAtMouse = normalizedX * totalDistance;
            
            // Find closest index
            let closestIdx = 0;
            let minDiff = Infinity;
            for (let i = 0; i < cumulativeDistance.length; i++) {
                const diff = Math.abs(cumulativeDistance[i] - distanceAtMouse);
                if (diff < minDiff) {
                    minDiff = diff;
                    closestIdx = i;
                }
            }
            
            const distance = cumulativeDistance[closestIdx];
            const elevation = pointsWithEle[closestIdx].ele;
            const gain = accumulatedGain[closestIdx];

            // Beregn gradient (stigningsprosent) over et vindu
            const GRADIENT_WINDOW = 5; // antall punkter før og etter
            let gradient = 0;
            if (closestIdx >= GRADIENT_WINDOW && closestIdx < elevations.length - GRADIENT_WINDOW) {
                const startIdx = closestIdx - GRADIENT_WINDOW;
                const endIdx = closestIdx + GRADIENT_WINDOW;
                const distanceWindow = (cumulativeDistance[endIdx] - cumulativeDistance[startIdx]) * 1000; // meter
                const eleChange = elevations[endIdx] - elevations[startIdx]; // meter
                if (distanceWindow > 0) {
                    gradient = (eleChange / distanceWindow) * 100; // prosent
                }
            }

            // Beregn Y-posisjon på løypa
            const profileY = canvas.height - ((elevation - minEle) / (maxEle - minEle)) * (canvas.height - 20);
            const screenX = rect.left + (cumulativeDistance[closestIdx] / totalDistance) * canvas.width;
            const screenY = rect.top + profileY;

            // Vis og flytt sykkel-markør (følger løypa i høyde, mus i lengde)
            const cyclist = document.getElementById('elevationCyclist');
            cyclist.style.display = 'flex';
            cyclist.style.left = (screenX - 20) + 'px'; // Sentrert på sykkel (20px = halv bredde)
            cyclist.style.top = (screenY - 20) + 'px'; // Sentrert på sykkel (20px = halv høyde)

            // Oppdater tooltip HTML først for å få riktig bredde
            const gradientIcon = gradient > 0 ? '📈' : (gradient < 0 ? '📉' : '➡️');
            const gradientSign = gradient > 0 ? '+' : '';
            tooltip.innerHTML = `
                📍 ${distance.toFixed(1)} km<br>
                🏔️ ${elevation.toFixed(0)} moh<br>
                ⬆️ ${gain.toFixed(0)} m akkumulert<br>
                ${gradientIcon} ${gradientSign}${gradient.toFixed(1)}%
            `;
            
            // Vis tooltip SENTRERT over syklisten
            tooltip.style.display = 'block';
            
            // Vent til neste frame for å få riktig offsetWidth
            requestAnimationFrame(() => {
                const tooltipWidth = tooltip.offsetWidth;
                tooltip.style.left = (screenX - tooltipWidth / 2) + 'px'; // Sentrert horisontalt
                tooltip.style.top = (screenY - 90) + 'px'; // 90px over syklisten (litt mer opp)
            });
        });
        
        canvas.addEventListener('mouseleave', () => {
            tooltip.style.display = 'none';
            document.getElementById('elevationCyclist').style.display = 'none';
        });

        // ---- Klatrebadge hover + klikk ----
        (function() {
            const BW = 86, BH = 38, GAP = 14;
            function badgeAt(mx, my) {
                return climbBadges.find(b => {
                    const bcy = Math.max(BH / 2 + 5, b.peakY - GAP - BH / 2);
                    return mx >= b.peakX - BW / 2 && mx <= b.peakX + BW / 2 &&
                           my >= bcy - BH / 2     && my <= bcy + BH / 2;
                });
            }
            canvas.addEventListener('mousemove', (e) => {
                const r = canvas.getBoundingClientRect();
                const mx = (e.clientX - r.left) * (canvas.width / r.width);
                const my = (e.clientY - r.top)  * (canvas.height / r.height);
                canvas.style.cursor = badgeAt(mx, my) ? 'pointer' : '';
            });
            canvas.addEventListener('click', (e) => {
                const r = canvas.getBoundingClientRect();
                const mx = (e.clientX - r.left) * (canvas.width / r.width);
                const my = (e.clientY - r.top)  * (canvas.height / r.height);
                const b = badgeAt(mx, my);
                if (b) {
                    const filesParam = b.routeFiles.map(encodeURIComponent).join(',');
                    window.open(`analyze-climbs.html?files=${filesParam}`, '_blank');
                }
            });
        })();

        // ---- Tegn bakgrunn og grid ----
        function drawBackground() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Tegn grid-linjer med høyde-labels (SAMME formel som profil-kurven)
            ctx.strokeStyle = 'rgba(0,245,255,0.2)';
            ctx.lineWidth = 1;
            ctx.fillStyle = '#00f5ff';
            ctx.font = '10px Courier New';
            ctx.textAlign = 'left';
            
            for (let i = 0; i <= 5; i++) {
                // Beregn høyden for denne linjen (samme som profil-kurven)
                const elevationAtLine = maxEle - ((maxEle - minEle) / 5) * i;
                
                // Beregn Y-posisjon (SAMME formel som profil-kurven!)
                const y = canvas.height - ((elevationAtLine - minEle) / (maxEle - minEle)) * (canvas.height - 20);
                
                // Tegn linje
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
                
                // Tegn høyde-label på ALLE linjer (venstre side)
                ctx.fillText(`${elevationAtLine.toFixed(0)}m`, 5, y + 12);
            }
        }

        drawBackground();

        // ---- Finn toppene (lokale maxima med kategorisering) ----
        function findPeaks(elev, dist, dayId) {
            const W = 6;
            const MAX_PEAKS = dayId === 4 ? 9 : 9;
            const MIN_PROMINENCE = 100;
            const MIN_DISTANCE_KM = 2.5;
            const MIN_ELEVATION = 300;
            
            // Finn kandidater (lokale maxima)
            let candidates = [];
            for (let i = W; i < elev.length - W; i++) {
                const current = elev[i];
                if (current < MIN_ELEVATION) continue;
                
                const before = Math.max(...elev.slice(i - W, i));
                const after = Math.max(...elev.slice(i + 1, i + W + 1));
                
                if (current >= before && current >= after) {
                    candidates.push({ 
                        index: i, 
                        elevation: current, 
                        distance: dist[i] 
                    });
                }
            }
            
            candidates.sort((a, b) => b.elevation - a.elevation);
            
            // Velg topper med nok avstand og prominence
            const selected = [];
            for (let peak of candidates) {
                if (selected.length === 0) {
                    selected.push(peak);
                    continue;
                }
                
                let tooClose = false;
                for (let prev of selected) {
                    const distDiff = Math.abs(peak.distance - prev.distance);
                    
                    if (distDiff < MIN_DISTANCE_KM) {
                        tooClose = true;
                        break;
                    }
                    
                    const startIdx = Math.min(prev.index, peak.index);
                    const endIdx = Math.max(prev.index, peak.index);
                    const minBetween = Math.min(...elev.slice(startIdx, endIdx + 1));
                    const lowerPeak = Math.min(prev.elevation, peak.elevation);
                    const prominence = lowerPeak - minBetween;
                    
                    if (prominence < MIN_PROMINENCE) {
                        tooClose = true;
                        break;
                    }
                }
                
                if (!tooClose) {
                    selected.push(peak);
                }
                
                if (selected.length >= MAX_PEAKS) break;
            }
            
            // ENKLERE TILNÆRMING: Finn høyeste og laveste punkter, beregn statistikk
            const peaksWithCategory = selected.map(peak => {
                // Finn laveste punkt (dal) før denne toppen
                // Se bakover til forrige topp eller starten
                let searchStart = 0;
                for (let i = 0; i < selected.length; i++) {
                    if (selected[i].index < peak.index && selected[i].index > searchStart) {
                        searchStart = selected[i].index;
                    }
                }

                // Finn laveste punkt mellom searchStart og peak
                let valleyIndex = searchStart;
                let lowestEle = elev[searchStart];
                for (let i = searchStart; i < peak.index; i++) {
                    if (elev[i] < lowestEle) {
                        lowestEle = elev[i];
                        valleyIndex = i;
                    }
                }

                // Beregn statistikk fra dal til topp
                let climbStart = valleyIndex;
                let climbDistanceKm = dist[peak.index] - dist[climbStart]; // km
                let climbGain = elev[peak.index] - elev[climbStart]; // meter
                let avgGradient = climbDistanceKm > 0 ? (climbGain / (climbDistanceKm * 1000)) * 100 : 0;

                // OPTIMALISERING: Hvis gradienten er for lav, prøv å korte inn fra starten
                // til vi finner en kortere seksjon som oppfyller kravene
                if (avgGradient < CLIMB_CONFIG.minGradient && climbDistanceKm > CLIMB_CONFIG.minLength) {
                    // Prøv å flytte startpunktet nærmere toppen
                    let bestStart = climbStart;
                    let bestGradient = avgGradient;
                    const UPHILL_W = 6; // punkter fremover for å bekrefte oppoverbakke

                    for (let i = climbStart + 1; i < peak.index - UPHILL_W; i++) {
                        // Hopp over punkt der terrenget er nedoverbakke fremover
                        // (unngå å starte midt i en nedstigning)
                        if (elev[i + UPHILL_W] <= elev[i]) continue;

                        const testDistKm = dist[peak.index] - dist[i];
                        const testGain = elev[peak.index] - elev[i];
                        const testGradient = testDistKm > 0 ? (testGain / (testDistKm * 1000)) * 100 : 0;

                        // Sjekk om denne seksjonen oppfyller minimumskrav
                        if (testDistKm >= CLIMB_CONFIG.minLength &&
                            testGain >= CLIMB_CONFIG.minElevation &&
                            testGradient >= CLIMB_CONFIG.minGradient) {
                            bestStart = i;
                            bestGradient = testGradient;
                            break; // Bruk første gyldige seksjon (lengste som kvalifiserer)
                        }
                    }

                    // Oppdater hvis vi fant en bedre start
                    if (bestStart !== climbStart) {
                        // Snap til nærmeste lokale minimum i neste 20 punkter
                        // (ekstra sikkerhet mot GPS-støy nær startpunktet)
                        const SNAP_RANGE = 20;
                        let snapMin = elev[bestStart];
                        let snapTo = bestStart;
                        for (let i = bestStart + 1; i <= Math.min(bestStart + SNAP_RANGE, peak.index - 1); i++) {
                            if (elev[i] < snapMin) {
                                snapMin = elev[i];
                                snapTo = i;
                            }
                        }
                        climbStart = snapTo;
                        climbDistanceKm = dist[peak.index] - dist[climbStart];
                        climbGain = elev[peak.index] - elev[climbStart];
                        avgGradient = climbDistanceKm > 0 ? (climbGain / (climbDistanceKm * 1000)) * 100 : 0;
                    }
                }

                // Bruk shared classification fra climb-classifier.js
                const classification = classifyClimb(climbGain, climbDistanceKm);

                // Hvis klatringen ikke oppfyller minimumskrav, vis kun stjerne uten kategori
                const category = classification ? classification.category : null;
                const score = classification ? classification.points : 0;

                // Finn midtpunkt av stigningen for plassering av merke
                const midIndex = Math.floor((climbStart + peak.index) / 2);

                // Sjekk hvorfor den ikke fikk kategori
                let reason = null;
                if (!classification) {
                    if (climbDistanceKm < CLIMB_CONFIG.minLength) {
                        reason = `For kort (${climbDistanceKm.toFixed(2)}km < ${CLIMB_CONFIG.minLength}km)`;
                    } else if (climbGain < CLIMB_CONFIG.minElevation) {
                        reason = `For lite stigning (${Math.round(climbGain)}m < ${CLIMB_CONFIG.minElevation}m)`;
                    } else if (avgGradient < CLIMB_CONFIG.minGradient) {
                        reason = `For slak (${avgGradient.toFixed(1)}% < ${CLIMB_CONFIG.minGradient}%)`;
                    } else {
                        // Oppfyller minimumskrav, men ikke nok poeng for kategori
                        const points = (climbGain * avgGradient) / 10;
                        reason = `For få poeng (${Math.round(points)}p < 30p minimum for Kat 4)`;
                    }
                }

                return {
                    index: peak.index,
                    startIndex: climbStart, // indeks hvor bakken starter
                    midIndex: midIndex,
                    category: category,
                    score: score,
                    climbGain: Math.round(climbGain),
                    climbDistance: Math.round(climbDistanceKm * 1000), // lagre som meter for visning
                    avgGradient: avgGradient,
                    reason: reason,
                    startDistance: dist[climbStart] // km - hvor langt ut i løypa bakken starter
                };
            });

            // --- DETALJERT ANALYSE: Alle høyeste punkter med tilhørende laveste punkter ---
            console.log(`\n=== DAG ${dayId} - DETALJERT BAKKEANALYSE ===`);
            console.log(`Analyserer ${peaksWithCategory.length} topper (fra høyeste til laveste):\n`);
            console.log('Format: DAL → TOPP | Distanse | Stigning | Gradient | Status\n');

            peaksWithCategory.forEach((peak, idx) => {
                const valleyKm = peak.startDistance;
                const peakKm = dist[peak.index];
                const valleyEle = elev[peak.index] - peak.climbGain;
                const peakEle = elev[peak.index];

                const status = peak.category
                    ? `✅ ${peak.category} (${peak.score}p)`
                    : `❌ ${peak.reason}`;

                console.log(
                    `${String(idx + 1).padStart(2)}. ` +
                    `${valleyKm.toFixed(1)}km (${Math.round(valleyEle)}m) → ` +
                    `${peakKm.toFixed(1)}km (${Math.round(peakEle)}m) | ` +
                    `${(peak.climbDistance/1000).toFixed(2)}km | ` +
                    `${peak.climbGain}m ↑ | ` +
                    `${peak.avgGradient.toFixed(1)}% | ` +
                    `${status}`
                );
            });
            console.log('\n💡 Se visuelt på profilen og sammenlign med listen over.');

            return peaksWithCategory;
        }

        const peakIndexes = findPeaks(elevations, cumulativeDistance, dayId);
        
        // Beregn total klatrepoeng for dagen
        let totalClimbingPoints = 0;
        peakIndexes.forEach(peak => {
            totalClimbingPoints += peak.score;
        });
        
        // Sett tittel med klatrepoeng
        const dayNames = ['Port de Soller', 'Cap de Formentor', 'Sa Calobra', 'Sant Salvador'];
        let titleText = profileTitle;
        if (profileTitle.startsWith('Dag ') && dayId >= 1 && dayId <= 4) {
            titleText = `Dag ${dayId} (${dayNames[dayId - 1]})`;
        }
        title.textContent = `Løypeprofil - ${titleText} - ${totalClimbingPoints} klatrepoeng`;

        // ---- Finn møtet mellom ruter ----
        let meetIdx = dayRoutes.length > 1 ? dayRoutes[0].gpxPoints.length - 1 : Math.floor(pointsWithEle.length / 2);
        let endPoint = dayRoutes.length > 1 ? dayRoutes[1].gpxPoints.length - 1 : pointsWithEle.length - 1;
        
        const meetX = cumulativeDistance[meetIdx] / totalDistance * canvas.width;
        const meetY = canvas.height - ((pointsWithEle[meetIdx].ele - minEle)/(maxEle - minEle))*(canvas.height-20);

        // ---- Animer kurven og stjerner ----
        let progress = 0;
        const animationDuration = 1200;
        let startTime = null;
        const peaks = [];
        const shownPeaks = new Set(); // Track hvilke peaks som allerede er vist
        const climbBadges = []; // Neon-badges for kategoriserte klatringer
        const shownBadges = new Set();
        const BADGE_ANIM_DUR = 450; // ms for pop-in animasjon

        function animateProfile(timestamp) {
            if (!startTime) startTime = timestamp;
            const elapsed = timestamp - startTime;
            progress = Math.min(elapsed / animationDuration, 1);

            // --- Tegn bakgrunn og grid ---
            drawBackground();

            const maxIndex = Math.floor(progress * (pointsWithEle.length - 1));

            // --- Tegn fargede soner for klassifiserte bakker progressivt ---
            peakIndexes.forEach(peak => {
                if (peak.category && maxIndex >= peak.startIndex) { // Kun vis for klassifiserte bakker som er nådd
                    // Velg farge basert på kategori - gradient fra cyan til magenta til rød
                    let color;
                    switch(peak.category) {
                        case 'HC':
                            color = 'rgba(255, 100, 100, 1)'; // Rød/rosa (vanskeligst)
                            break;
                        case '1':
                            color = 'rgba(255, 0, 255, 1)'; // Magenta
                            break;
                        case '2':
                            color = 'rgba(160, 100, 255, 1)'; // Lilla
                            break;
                        case '3':
                            color = 'rgba(0, 180, 255, 1)'; // Cyan/blå
                            break;
                        case '4':
                            color = 'rgba(0, 245, 255, 1)'; // Lys cyan (letteste)
                            break;
                        default:
                            color = 'rgba(100, 100, 150, 1)'; // Grå/blå
                    }

                    // Tegn farge-sone som følger profilen (kun under kurven)
                    ctx.fillStyle = color;
                    ctx.beginPath();

                    // Start nederst til venstre
                    const startX = cumulativeDistance[peak.startIndex] / totalDistance * canvas.width;
                    ctx.moveTo(startX, canvas.height);

                    // Gå opp til profilen og følg den bare til current animation position
                    const endDrawIndex = Math.min(peak.index, maxIndex);
                    for (let i = peak.startIndex; i <= endDrawIndex; i++) {
                        const x = cumulativeDistance[i] / totalDistance * canvas.width;
                        const y = canvas.height - ((elevations[i] - minEle) / (maxEle - minEle)) * (canvas.height - 20);
                        ctx.lineTo(x, y);
                    }

                    // Gå ned til bunnen høyre og lukk
                    const endX = cumulativeDistance[endDrawIndex] / totalDistance * canvas.width;
                    ctx.lineTo(endX, canvas.height);
                    ctx.closePath();
                    ctx.fill();
                }
            });

            // --- Tegn kurve ---
            ctx.beginPath();
            ctx.strokeStyle = '#00f5ff';
            ctx.lineWidth = 2;
            for (let i = 0; i <= maxIndex; i++) {
                const x = cumulativeDistance[i] / totalDistance * canvas.width;
                const y = canvas.height - ((elevations[i] - minEle) / (maxEle - minEle)) * (canvas.height - 20);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);

                // --- push stjerner og kategorier EN gang når vi når toppen ---
                for (let peak of peakIndexes) {
                    if (i === peak.index && !shownPeaks.has(peak.index)) {
                        peaks.push({
                            x,
                            y,
                            life: 0,
                            index: peak.index,
                            category: peak.category,
                            midIndex: peak.midIndex
                        });
                        shownPeaks.add(peak.index);
                    }
                    // Spawn neon-badge ved toppen (summiten) av klatringen
                    if (peak.category && i === peak.index && !shownBadges.has(peak.index)) {
                        const badgeColors = { 'HC':'#ff6464', '1':'#ff00ff', '2':'#a064ff', '3':'#00b4ff', '4':'#00f5ff' };
                        const bx = cumulativeDistance[peak.index] / totalDistance * canvas.width;
                        const by = canvas.height - ((elevations[peak.index] - minEle) / (maxEle - minEle)) * (canvas.height - 20);
                        climbBadges.push({
                            peakX: bx, peakY: by,
                            category: peak.category,
                            color: badgeColors[peak.category] || '#00f5ff',
                            bornElapsed: elapsed,
                            avgGradient: peak.avgGradient,
                            climbGain: peak.climbGain,
                            routeFiles: dayRoutes.map(r => r.fileName)
                        });
                        shownBadges.add(peak.index);
                    }
                }
            }
            ctx.stroke();

            // --- Tegn stjerner og neon-badges ---
            drawStars();
            drawClimbBadges(elapsed);
            
            // --- Tegn øl når animasjonen når midtpunktet (dag 1-3, kun for 2-ruters dager) ---
            if (dayId !== 4 && dayRoutes.length > 1 && maxIndex >= meetIdx) {
                ctx.save();
                ctx.imageSmoothingEnabled = false;
                ctx.font = '32px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('🍺', meetX, meetY - 16);
                ctx.restore();
            }
            
            // --- Tegn champagne når animasjonen er ferdig (dag 4) ---
            if (dayId === 4 && progress >= 1) {
                const lastIdx = pointsWithEle.length - 1;
                const endX = (cumulativeDistance[lastIdx] / totalDistance) * canvas.width;
                const endY = canvas.height - ((elevations[lastIdx] - minEle) / (maxEle - minEle)) * (canvas.height - 20);
                
                // Trigger confetti kun én gang
                if (!window.champagneShown) {
                    window.champagneShown = true;
                    const rect = canvas.getBoundingClientRect();
                    triggerConfettiAt(rect.left + endX - 15, rect.top + endY - 30); // Lenger til venstre (-15) og opp (-30)
                }
                
                ctx.save();
                ctx.imageSmoothingEnabled = false;
                ctx.font = '32px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('🥂', endX - 15, endY - 30); // Lenger til venstre (-15) og opp (-30)
                ctx.restore();
            }
            
            // --- Fortsett animasjon ---
            const allBadgesDone = climbBadges.length === 0 || climbBadges.every(b => (elapsed - b.bornElapsed) >= BADGE_ANIM_DUR);
            if (progress < 1 || peaks.length > 0 || !allBadgesDone) {
                requestAnimationFrame(animateProfile);
            }
        }

        function drawStars() {
            for (let i = peaks.length - 1; i >= 0; i--) {
                const star = peaks[i];
                star.life += 0.02;
                const rise = star.life * 40;
                const opacity = 1 - star.life;
                if (opacity <= 0) {
                    peaks.splice(i, 1);
                    continue;
                }
                ctx.save();
                ctx.globalAlpha = opacity;
                drawStar(ctx, star.x, star.y - rise, 5, 8, 4);
                ctx.restore();
            }
        }

        function climbBadgeRoundRect(x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.arcTo(x + w, y, x + w, y + r, r);
            ctx.lineTo(x + w, y + h - r);
            ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
            ctx.lineTo(x + r, y + h);
            ctx.arcTo(x, y + h, x, y + h - r, r);
            ctx.lineTo(x, y + r);
            ctx.arcTo(x, y, x + r, y, r);
            ctx.closePath();
        }

        function drawClimbBadges(elapsed) {
            const BW = 86, BH = 38, BR = 5, GAP = 14;
            climbBadges.forEach(badge => {
                const age = elapsed - badge.bornElapsed;
                let scale;
                if (age >= BADGE_ANIM_DUR) {
                    scale = 1.0;
                } else {
                    const t = age / BADGE_ANIM_DUR;
                    if (t < 0.5)      scale = (t / 0.5) * 1.15;
                    else if (t < 0.8) scale = 1.15 - ((t - 0.5) / 0.3) * 0.18;
                    else              scale = 0.97 + ((t - 0.8) / 0.2) * 0.03;
                }
                const label = badge.category === 'HC' ? 'HC' : `K${badge.category}`;
                const gradStr = `${badge.avgGradient.toFixed(1)}%`;
                const gainStr = `↑${badge.climbGain}m`;
                // Klamp badge innenfor canvas-toppen
                const bcy = Math.max(BH / 2 + 5, badge.peakY - GAP - BH / 2);

                // --- Badge ---
                ctx.save();
                ctx.translate(badge.peakX, bcy);
                ctx.scale(scale, scale);

                // Ytre neon-glow
                ctx.shadowBlur = 22;
                ctx.shadowColor = badge.color;

                // Mørk bakgrunn
                ctx.fillStyle = 'rgba(4, 4, 20, 0.96)';
                climbBadgeRoundRect(-BW / 2, -BH / 2, BW, BH, BR);
                ctx.fill();

                // Neon kantlinje
                ctx.shadowBlur = 12;
                ctx.strokeStyle = badge.color;
                ctx.lineWidth = 1.5;
                climbBadgeRoundRect(-BW / 2, -BH / 2, BW, BH, BR);
                ctx.stroke();

                // Vertikal skillelinje mellom kategori og stats
                ctx.shadowBlur = 0;
                ctx.strokeStyle = badge.color + '44';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(8, -BH / 2 + 7);
                ctx.lineTo(8, BH / 2 - 7);
                ctx.stroke();

                // Kategori-tekst (venstre side) — stor og neon
                ctx.shadowBlur = 12;
                ctx.shadowColor = badge.color;
                ctx.fillStyle = badge.color;
                ctx.font = 'bold 13px "Courier New"';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(`▲ ${label}`, -BW / 4 - 4, 0);

                // Gradient (høyre side, øverst)
                ctx.shadowBlur = 4;
                ctx.fillStyle = 'rgba(255,255,255,0.88)';
                ctx.font = 'bold 10px "Courier New"';
                ctx.fillText(gradStr, BW / 4 + 8, -7);

                // Høydemeter (høyre side, nederst)
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.font = '8px "Courier New"';
                ctx.fillText(gainStr, BW / 4 + 8, 7);

                ctx.restore();

                // --- Stiplet linje fra badge ned til topppunktet ---
                const lineOpacity = Math.min(age / (BADGE_ANIM_DUR * 0.5), 1) * 0.55;
                if (lineOpacity > 0) {
                    ctx.save();
                    ctx.globalAlpha = lineOpacity;
                    ctx.strokeStyle = badge.color;
                    ctx.lineWidth = 1;
                    ctx.shadowBlur = 4;
                    ctx.shadowColor = badge.color;
                    ctx.setLineDash([3, 4]);
                    ctx.beginPath();
                    ctx.moveTo(badge.peakX, bcy + (BH / 2) * scale);
                    ctx.lineTo(badge.peakX, badge.peakY - 5);
                    ctx.stroke();
                    ctx.setLineDash([]);
                    ctx.restore();
                }

                // --- Summit-dot (liten sirkel ved toppen) ---
                const dotOpacity = Math.min(age / (BADGE_ANIM_DUR * 0.35), 1);
                ctx.save();
                ctx.globalAlpha = dotOpacity;
                ctx.fillStyle = badge.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = badge.color;
                ctx.beginPath();
                ctx.arc(badge.peakX, badge.peakY, 4, 0, 2 * Math.PI);
                ctx.fill();
                ctx.restore();
            });
        }

        // Start animasjon
        requestAnimationFrame(animateProfile);

        // ---- Tegn total distanse label ETTER animasjon (kun én gang) ----
        setTimeout(() => {
            ctx.fillStyle = '#00f5ff';
            ctx.font = '11px Courier New';
            ctx.fillText(`${totalDistance.toFixed(1)}km`, canvas.width - 60, canvas.height - 5);
        }, animationDuration + 100);

    });
};




    function drawStar(ctx, cx, cy, spikes, outerRadius, innerRadius) {

        let rot = Math.PI / 2 * 3;
        let x = cx;
        let y = cy;
        const step = Math.PI / spikes;

        ctx.beginPath();
        ctx.moveTo(cx, cy - outerRadius);

        for (let i = 0; i < spikes; i++) {
            x = cx + Math.cos(rot) * outerRadius;
            y = cy + Math.sin(rot) * outerRadius;
            ctx.lineTo(x, y);
            rot += step;

            x = cx + Math.cos(rot) * innerRadius;
            y = cy + Math.sin(rot) * innerRadius;
            ctx.lineTo(x, y);
            rot += step;
        }

        ctx.lineTo(cx, cy - outerRadius);
        ctx.closePath();

        ctx.fillStyle = '#ffd700';
        ctx.fill();
    };
    function triggerConfettiAt(x, y) {
        const container = document.getElementById('confetti-container');
        if (!container) return;

        for (let i = 0; i < 40; i++) {
            const confetti = document.createElement('div');
            confetti.className = 'confetti';

            const angle = Math.random() * 2 * Math.PI;
            const distance = 80 + Math.random() * 80;

            confetti.style.left = `${x}px`;
            confetti.style.top = `${y}px`;

            confetti.style.setProperty('--x', `${Math.cos(angle) * distance}px`);
            confetti.style.setProperty('--y', `${Math.sin(angle) * distance}px`);

            confetti.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 60%)`;

            container.appendChild(confetti);

            setTimeout(() => confetti.remove(), 3000); // 3000ms
        }
    }

    // Konfetti-funksjon
    function triggerConfetti() {
        const container = document.getElementById('confetti-container');
        const numConfetti = 50; // flere biter

        for (let i = 0; i < numConfetti; i++) {
            const confetti = document.createElement('div');
            confetti.classList.add('confetti');

            // tilfeldig farge
            confetti.style.backgroundColor = `hsl(${Math.random() * 360}, 80%, 60%)`;

            // startposisjon (midten av skjermen / kan justeres til badge)
            confetti.style.left = `${window.innerWidth / 2}px`;
            confetti.style.top = `${window.innerHeight / 3}px`;

            // tilfeldig retning og avstand
            const x = (Math.random() - 0.5) * 400; // -200 til +200 px
            const y = (Math.random() - 0.5) * 300; // -150 til +150 px
            confetti.style.setProperty('--x', `${x}px`);
            confetti.style.setProperty('--y', `${y}px`);

            // tilfeldig størrelse
            const size = 8 + Math.random() * 8;
            confetti.style.width = `${size}px`;
            confetti.style.height = `${size}px`;

            // legg til i container
            container.appendChild(confetti);

            // fjern etter animasjon
            setTimeout(() => container.removeChild(confetti), 1500);
        }
    }





    </script>

            },
            {

                brand: 'SaddleGold™',
                headline: 'For ømme steder ingen snakker om.',
                copy: 'SaddleGold chamois krem – den hemmeligheten alle syklister har men ingen innrømmer å trenge.',
                cta: 'Se tilbud',
                url: 'bikeshop.no',
                link: 'https://bikeshop.no/assos/p139092099/assos-chamois-krem-200-ml-forhindrer-sårhet-og-infeksjon',
                image: 'chamois.png', imagePosition: 'center 45%',

                features: [

                    'Fungerer faktisk – i motsetning til "å bare herdes"'

        ];

        let currentAd = null;
        let nextAdTimeout = null;
        let adIndex = 0;

        function showAd(ad) {
            currentAd = ad;
            const adImageEl = document.getElementById('adEmoji');
            if (ad.image) {
                const pos = ad.imagePosition || 'center 15%';
                adImageEl.innerHTML = `<img src="${ad.image}" alt="${ad.brand}" style="object-position:${pos}">`;
            } else {
                adImageEl.textContent = ad.emoji;
            }
            document.getElementById('adBrand').textContent = ad.brand;
            document.getElementById('adHeadline').textContent = ad.headline;
            document.getElementById('adCopy').textContent = ad.copy;
            document.getElementById('adCTA').textContent = ad.cta;
            document.getElementById('adUrl').textContent = ad.url;

            const banner = document.getElementById('adBanner');
            banner.style.animation = 'none';
            banner.offsetHeight; // reflow
            banner.style.animation = '';
            banner.style.display = 'block';
        }

        window.closeAd = function(e) {
            if (e) e.stopPropagation();
            document.getElementById('adBanner').style.display = 'none';
            scheduleNextAd();
        };

        window.closeAdPopup = function() {
            document.getElementById('adPopup').classList.remove('open');
            scheduleNextAd();
        };

        function openAdPopup(ad) {
            document.getElementById('adPopup').classList.add('open');
            const popupEmoji = document.getElementById('adPopupEmoji');
            if (ad.image) {
                const pos = ad.imagePosition || 'center 15%';
                popupEmoji.innerHTML = `<img src="${ad.image}" alt="${ad.brand}" class="ad-popup-img" style="object-position:${pos}">`;
            } else {
                popupEmoji.textContent = ad.emoji;
            }
            document.getElementById('adPopupBrand').textContent = ad.brand;
            document.getElementById('adPopupName').textContent = ad.name;
            document.getElementById('adPopupTagline').textContent = ad.tagline;
            const ul = document.getElementById('adPopupFeatures');
            ul.innerHTML = '';
            ad.features.forEach(f => {
                const li = document.createElement('li');
                li.textContent = f;
                ul.appendChild(li);
            });
            document.getElementById('adPopupReview').innerHTML =
                '<span class="stars">★★★★★</span> ' + ad.review.replace(/^⭐+\s*/, '');
            document.getElementById('adPopupPrice').textContent = ad.price;
            document.getElementById('adPopupCTA').onclick = function() {
                window.open(ad.link, '_blank');
                closeAdPopup();
            };
        }

        // Click on banner → open popup
        document.getElementById('adBanner').addEventListener('click', function() {
            if (!currentAd) return;
            document.getElementById('adBanner').style.display = 'none';
            openAdPopup(currentAd);
        });

        // Click outside popup to close
        document.getElementById('adPopup').addEventListener('click', function(e) {
            if (e.target === this) closeAdPopup();
        });

        function scheduleNextAd() {
            clearTimeout(nextAdTimeout);
            // Random delay: 8–20 seconds between ads
            const delay = (8 + Math.random() * 12) * 1000;
            nextAdTimeout = setTimeout(() => {
                showAd(ADS[adIndex % ADS.length]);
                adIndex++;
            }, delay);
        }

        // Start: first ad appears after 5–10 seconds
        const firstDelay = (5 + Math.random() * 5) * 1000;
        nextAdTimeout = setTimeout(() => {
            showAd(ADS[0]);
            adIndex = 1;
        }, firstDelay);
    })();
    </script>
